name: source collector

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      PUBLIC_API_BASE_URL: ${{ secrets.COLLECTOR_API_BASE_URL }}
      COLLECTOR_API_TOKEN: ${{ secrets.COLLECTOR_API_TOKEN }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - name: Trigger a bounded collection run
        run: >-
          uv run --frozen python scripts/trigger_collector.py
          --rounds 10
          --jobs-per-tick 40
          --deadline-seconds 1500
